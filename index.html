            font-size: 15px;
            font-weight: 600;

            font-weight: 600;

        }

        }

            background: #34a853;

            padding: 8px 14px;

            border-radius: 4px;
            text-decoration: none;

<div class="container">
    <h2>Elector Roll PDF Finder Pro</h2>
    <div class="subtitle">Search Assembly Constituency and Polling Station info to retrieve PDF download pathways</div>

    <div class="form-grid">

            <select id="state">

                <option value="Delhi">Delhi</option>
                <option value="Uttar Pradesh">Uttar Pradesh</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ac">AC Number (Assembly Constituency)</label>
            <input type="number" id="ac" min="1" placeholder="Enter AC Number" required>
        </div>

        <div class="form-group">
            <label id="psLabel" for="ps">Polling Station (PS) No. <span style="color:red;">*</span></label>
            <input type="number" id="ps" min="1" placeholder="e.g. 45">
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-secondary" onclick="clearForm()">Reset All</button>
        <button class="btn-primary" onclick="searchRoll()">Search & Find PDF</button>
    </div>
</div>

<div class="results-container" id="resultsContainer">

    </div>
</div>

// Handle dynamic field changes for Chandigarh
document.getElementById("state").addEventListener("change", function() {
    const psInput = document.getElementById("ps");
    const psLabel = document.getElementById("psLabel");
    if (this.value === "Chandigarh") {
        psInput.placeholder = "Not required for Chandigarh";
        psInput.disabled = true;
        psInput.value = "";
        psLabel.innerHTML = 'Polling Station (PS) No. <span style="color:#666; font-weight:normal;">(Not required)</span>';
    } else {
        psInput.placeholder = "e.g. 45";
        psInput.disabled = false;
        psLabel.innerHTML = 'Polling Station (PS) No. <span style="color:red;">*</span>';
    }
});

function pad3(num) {
    return String(num).padStart(3, '0');
}

function getPdfUrl(state, ac, ps) {
    if (state === "Chandigarh") {
        return `https://ceochandigarh.gov.in//chd/chd${ac}.PDF`;
    }

    const eciStates = {
        "Punjab": { folder: "f2", code: "S19" },
        "Haryana": { folder: "f1", code: "S07" },
        "Madhya Pradesh": { folder: "f2", code: "S12" },
        "Himachal Pradesh": { folder: "f1", code: "S08" },
        "Delhi": { folder: "f4", code: "U05" }
    };

    if (state === "Uttar Pradesh") {
        const ac3 = pad3(ac);
        const ps3 = pad3(ps);
        return `https://ceouttarpradesh.nic.in/rollpdf/Erollpdf/AC${ac3}/AC${ac3}P${ps3}.pdf`;
    } else {
        const cfg = eciStates[state];
        if (cfg) {
            return `https://www.eci.gov.in/sir/${cfg.folder}/${cfg.code}/data/OLDSIRROLL/${cfg.code}/${ac}/${cfg.code}_${ac}_${ps}.pdf`;
        }
    }
    return "";
}

function searchRoll() {
    const selectedState = document.getElementById("state").value;
    const acVal = document.getElementById("ac").value.trim();
    const psVal = document.getElementById("ps").value.trim();

    if (!acVal) {
        alert("Please enter the Assembly Constituency (AC) number.");
        return;
    }

    const acNum = parseInt(acVal, 10);
    
    // Check if the input is only valid for Chandigarh when PS is missing
    if (!psVal && selectedState !== "Chandigarh") {
        const hasChdMatch = database.some(item => item.n === acNum && item.s === "Chandigarh");
        if (!hasChdMatch) {
            alert("Please enter the Polling Station (PS) number. It is required for all states except Chandigarh.");
            return;
        }
    }

    // Filter local embedded database
    const matches = database.filter(item => {
        const matchAC = item.n === acNum;
        const matchState = selectedState === "" || item.s === selectedState;
        
        // If PS is omitted, we can only return Chandigarh records
        if (!psVal && item.s !== "Chandigarh") {
            return false;
        }
        
        return matchAC && matchState;
    });

    const container = document.getElementById("resultsContainer");
    const tbody = document.getElementById("resultsBody");
    
    tbody.innerHTML = "";
    container.style.display = "block";

    if (matches.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="no-results">No records found matching AC Number ${acVal} under current search criteria.</td></tr>`;
        return;
    }

    matches.forEach(item => {
        const url = getPdfUrl(item.s, item.n, psVal);
        const tr = document.createElement("tr");
        
        const isChd = item.s === "Chandigarh";
        const badgeClass = isChd ? "badge badge-chd" : "badge";
        const psDisplay = isChd ? "<em>Not Required</em>" : `No. ${psVal}`;

        tr.innerHTML = `
            <td><span class="${badgeClass}">${item.s}</span></td>
            <td>${item.d}</td>
            <td><strong>${item.c}</strong> (AC-${item.n})</td>
            <td>${psDisplay}</td>
            <td><a href="${url}" target="_blank" class="btn-open">Open PDF ↗</a></td>
        `;
        tbody.appendChild(tr);
    });
}

function clearForm() {
    document.getElementById("state").value = "";
    document.getElementById("ac").value = "";
    const psInput = document.getElementById("ps");
    psInput.value = "";
    psInput.placeholder = "e.g. 45";
    psInput.disabled = false;
    document.getElementById("psLabel").innerHTML = 'Polling Station (PS) No. <span style="color:red;">*</span>';
    document.getElementById("resultsContainer").style.display = "none";
}
</script>
